<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Ouma ✨</title>
    <style>
        /* Le fond rose et l'animation de base */
        body {
            background-color: #ffc0cb;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #d81b60;
            text-align: center;
        }

        /* La case principale */
        .card {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 10;
            max-width: 80%;
        }

        /* Les coeurs qui montent en continu */
        .floating-heart {
            position: absolute;
            bottom: -50px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
            animation: float 6s linear infinite;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Le bouton d'explosion */
        button {
            background-color: #d81b60;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }

        button:active { transform: scale(0.9); }

        /* Style pour l'explosion de coeurs */
        .burst {
            position: absolute;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>💖 Un site spécial pour une personne spéciale</h2>
        <p>Profite et n'oublie pas qu'on t'aime !</p>
        <p style="font-size: 0.8em; font-style: italic;">Désolé d'être un peu en retard 😅</p>
        
        <button onclick="explode(event)" id="secretBtn">Clique ici pour une surprise</button>
        <p id="secretMsg" style="display:none; font-weight: bold; margin-top: 15px;">Tu es unique au monde ! ✨</p>
    </div>

    <script>
        // Génération des coeurs en fond
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 300);

        // La fonction d'explosion (La touche secrète est ici !)
        function explode(e) {
            document.getElementById('secretMsg').style.display = 'block';
            document.getElementById('secretBtn').innerText = "Encore ! 💖";

            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.classList.add('burst');
                heart.style.left = e.clientX + 'px';
                heart.style.top = e.clientY + 'px';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 10 + 5;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;

                document.body.appendChild(heart);

                let posX = e.clientX;
                let posY = e.clientY;
                let opacity = 1;

                const move = setInterval(() => {
                    posX += dx;
                    posY += dy;
                    opacity -= 0.02;
                    heart.style.left = posX + 'px';
                    heart.style.top = posY + 'px';
                    heart.style.opacity = opacity;

                    if (opacity <= 0) {
                        clearInterval(move);
                        heart.remove();
                    }
                }, 20);
            }
        }
    </script>
</body>
</html>
